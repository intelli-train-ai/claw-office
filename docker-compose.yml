services:
  safeclaw:
    build:
      # Pull source from the intelli-train-ai/claw-office repo instead of the
      # local working tree. BuildKit clones the repo into the build context and
      # uses the Dockerfile shipped there. Override GIT_REF to build a tag/branch
      # other than main, e.g. `GIT_REF=v0.54.0 docker compose build`.
      context: https://github.com/intelli-train-ai/claw-office.git#${GIT_REF:-main}
      args:
        # Pin to a concrete version so this layer caches across builds.
        # `latest` defeats BuildKit cache because npm resolves it on every build.
        - CLAUDE_CODE_VERSION=${CLAUDE_CODE_VERSION:-2.1.121}
        # npm registry mirror — defaults to npmmirror (China) for faster installs.
        # Override with NPM_REGISTRY=https://registry.npmjs.org for upstream.
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "${PORT:-3811}:${PORT:-3811}"
    volumes:
      - safeclaw-data:/data
      - ${WORKSPACE_PATH:-./workspaces}:/workspaces
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3811}
      - CLAUDE_GUI_DATA_DIR=/data
      - SAFECLAW_WORKSPACE=/workspaces
      - SAFECLAW_ACCESS_TOKEN=${SAFECLAW_ACCESS_TOKEN:-}
      # Uncomment and set your API keys as needed:
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - OPENAI_API_KEY=sk-...
      #
      # ── Pre-seed vendor providers on first start ──
      # Each entry can reference a built-in preset key (see src/lib/provider-catalog.ts:
      # anthropic-official, anthropic-thirdparty, deepseek-anthropic, ucloud-claude,
      # glm-cn, glm-global, openrouter, kimi, moonshot, minimax-cn, minimax-global,
      # volcengine, xiaomi-mimo, bailian, bedrock, vertex, ollama, litellm) and just
      # supply the api_key. Matched idempotently by `name`. Set
      # SEED_PROVIDERS_OVERWRITE=1 to refresh existing entries on every restart.
      # - SEED_PROVIDERS_JSON=[{"preset":"deepseek-anthropic","name":"DeepSeek V4 Pro","api_key":"sk-...","set_active":true},{"preset":"ucloud-claude","name":"UCloud Claude","api_key":"sk-..."},{"preset":"glm-cn","name":"GLM (CN)","api_key":"..."}]
      # Or use a mounted file (recommended for multi-line / many providers):
      # - SEED_PROVIDERS_FILE=/data/providers.json
      # - SEED_PROVIDERS_OVERWRITE=0
    restart: unless-stopped

volumes:
  safeclaw-data:
