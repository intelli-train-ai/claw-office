services:
  codepilot:
    build:
      context: .
      args:
        - CLAUDE_CODE_VERSION=${CLAUDE_CODE_VERSION:-latest}
    ports:
      - "${PORT:-3811}:${PORT:-3811}"
    volumes:
      - codepilot-data:/data
      - ${WORKSPACE_PATH:-./workspaces}:/workspaces
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3811}
      - CLAUDE_GUI_DATA_DIR=/data
      - CODEPILOT_WORKSPACE=/workspaces
      - CODEPILOT_ACCESS_TOKEN=${CODEPILOT_ACCESS_TOKEN:-}
      # Uncomment and set your API keys as needed:
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - OPENAI_API_KEY=sk-...
    restart: unless-stopped

volumes:
  codepilot-data:
