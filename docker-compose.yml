services:
  safeclaw:
    build:
      # Pull source from the intelli-train-ai/claw-office repo instead of the
      # local working tree. BuildKit clones the repo into the build context and
      # uses the Dockerfile shipped there. Override GIT_REF to build a tag/branch
      # other than main, e.g. `GIT_REF=v0.54.0 docker compose build`.
      context: https://github.com/intelli-train-ai/claw-office.git#${GIT_REF:-main}
      args:
        - CLAUDE_CODE_VERSION=${CLAUDE_CODE_VERSION:-latest}
    ports:
      - "${PORT:-3811}:${PORT:-3811}"
    volumes:
      - safeclaw-data:/data
      - ${WORKSPACE_PATH:-./workspaces}:/workspaces
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3811}
      - CLAUDE_GUI_DATA_DIR=/data
      - SAFECLAW_WORKSPACE=/workspaces
      - SAFECLAW_ACCESS_TOKEN=${SAFECLAW_ACCESS_TOKEN:-}
      # Uncomment and set your API keys as needed:
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - OPENAI_API_KEY=sk-...
    restart: unless-stopped

volumes:
  safeclaw-data:
